<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Command Center - Bihar Yaatra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .font-display {
      font-family: 'Syne', sans-serif;
    }

    [x-cloak] {
      display: none !important;
    }

    .text-gradient {
      background: linear-gradient(90deg, #FF9933, #EC4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .bg-gradient {
      background: linear-gradient(135deg, #FF9933, #EC4899);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-marquee {
      display: inline-flex;
      animation: marquee 20s linear infinite;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden"
  x-data="loginApp()">

  <div
    class="fixed top-0 w-full bg-gray-900 text-white z-50 lg:hidden text-[10px] py-1.5 uppercase tracking-widest overflow-hidden border-b border-white/10">
    <div class="animate-marquee whitespace-nowrap">
      <span class="px-4"><i class="fas fa-circle text-green-500 text-[6px] mr-2"></i>System: Online</span>
      <span class="px-4"><i class="fas fa-shield-alt text-blue-400 mr-2"></i>2FA Active</span>
      <span class="px-4"><i class="fas fa-bolt text-yellow-400 mr-2"></i>Fast Server</span>
      <span class="px-4"><i class="fas fa-circle text-green-500 text-[6px] mr-2"></i>System: Online</span>
    </div>
  </div>

  <div
    class="w-full max-w-7xl px-4 lg:px-8 relative z-10 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center pt-12 pb-8 lg:py-0">

    <div class="hidden lg:flex lg:col-span-5 flex-col justify-center h-full p-8">
      <a href="#" class="font-display font-bold text-3xl tracking-tighter flex items-center gap-2 mb-6">
        Bihar<span class="text-gradient">Yaatra</span>
      </a>
      <h1 class="text-5xl font-display font-bold leading-tight mb-4">
        <span x-text="greeting"></span>, <br>
        <span class="text-gray-500 text-4xl" x-text="category === 'admin' ? 'Administrator.' : 'Partner.'"></span>
      </h1>
      <p class="text-gray-600 text-lg mb-8">Secure access to Bihar's tourism ecosystem.</p>
    </div>

    <div class="col-span-1 lg:col-span-7 w-full flex justify-center">
      <div
        class="bg-white w-full max-w-md lg:max-w-xl rounded-[1.5rem] lg:rounded-[2.5rem] shadow-xl p-5 sm:p-8 lg:p-12 border border-gray-100">

        <div class="lg:hidden flex flex-col items-center mb-6 text-center">
          <span class="font-display font-bold text-xl tracking-tighter mb-1">Bihar<span
              class="text-gradient">Yaatra</span></span>
          <h2 class="text-2xl font-display font-bold">
            <span x-text="greeting"></span>, <span class="text-gray-400"
              x-text="category === 'admin' ? 'Admin' : 'Partner'"></span>
          </h2>
        </div>

        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl lg:text-3xl font-bold font-display hidden lg:block">Login</h2>
          <div x-show="capsLockOn" class="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-1 rounded font-black">CAPS
            LOCK</div>
        </div>

        <div class="flex p-1 bg-gray-100 rounded-xl lg:rounded-2xl mb-6">
          <button @click="category = 'admin'; setRole('super_admin')"
            :class="category === 'admin' ? 'bg-white text-black shadow-sm' : 'text-gray-500'"
            class="flex-1 py-2.5 rounded-lg lg:rounded-xl text-xs lg:text-sm font-bold transition-all">Internal
            Admin</button>
          <button @click="category = 'partner'; setRole('homestay')"
            :class="category === 'partner' ? 'bg-white text-black shadow-sm' : 'text-gray-500'"
            class="flex-1 py-2.5 rounded-lg lg:rounded-xl text-xs lg:text-sm font-bold transition-all">Service
            Partner</button>
        </div>

        <div class="mb-6 overflow-x-auto no-scrollbar -mx-2 px-2">
          <div class="flex space-x-2 min-w-max pb-1">
            <template x-if="category === 'admin'">
              <div class="flex gap-2">
                <button @click="setRole('super_admin')"
                  :class="role === 'super_admin' ? 'bg-black text-white' : 'bg-gray-50 text-gray-500'"
                  class="px-4 py-2 rounded-lg text-xs font-bold transition-all border border-transparent">Super
                  Admin</button>
                <button @click="setRole('admin')"
                  :class="role === 'admin' ? 'bg-black text-white' : 'bg-gray-50 text-gray-500'"
                  class="px-4 py-2 rounded-lg text-xs font-bold transition-all border border-transparent">Regional
                  Admin</button>
              </div>
            </template>
            <template x-if="category === 'partner'">
              <div class="flex gap-2">
                <button @click="setRole('homestay')"
                  :class="role === 'homestay' ? 'bg-orange-500 text-white' : 'bg-gray-50 text-gray-500'"
                  class="px-4 py-2 rounded-lg text-xs font-bold transition-all border border-transparent">Homestay</button>
                <button @click="setRole('transport')"
                  :class="role === 'transport' ? 'bg-green-600 text-white' : 'bg-gray-50 text-gray-500'"
                  class="px-4 py-2 rounded-lg text-xs font-bold transition-all border border-transparent">Transport</button>
                <button @click="setRole('guide')"
                  :class="role === 'guide' ? 'bg-blue-500 text-white' : 'bg-gray-50 text-gray-500'"
                  class="px-4 py-2 rounded-lg text-xs font-bold transition-all border border-transparent">Tour
                  Guide</button>
              </div>
            </template>
          </div>
        </div>

        <form @submit.prevent="login" class="space-y-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase tracking-wider">Email
              Address</label>
            <input type="email" x-model="email" required
              class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border-2 border-transparent focus:bg-white focus:border-orange-500 outline-none transition-all text-sm font-medium"
              :placeholder="placeholders.email">
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1 uppercase tracking-wider">Password</label>
            <div class="relative">
              <input :type="showPass ? 'text' : 'password'" x-model="password" required
                class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border-2 border-transparent focus:bg-white focus:border-orange-500 outline-none transition-all text-sm font-medium"
                placeholder="••••••••">
              <button type="button" @click="showPass = !showPass"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">
                <i class="fas" :class="showPass ? 'fa-eye-slash' : 'fa-eye'"></i>
              </button>
            </div>
          </div>

          <div x-show="category === 'admin'" x-collapse class="pt-2">
            <div class="flex items-center justify-between mb-1.5 ml-1">
              <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">2FA Verification</label>
              <button type="button" @click="sendOTP()" :disabled="otpTimer > 0 || otpLoading"
                class="text-[10px] font-bold text-orange-600 disabled:text-gray-400 transition-colors">
                <span x-show="!otpLoading && otpTimer === 0">Get OTP</span>
                <span x-show="otpLoading">Sending...</span>
                <span x-show="otpTimer > 0" x-text="'Resend in ' + otpTimer + 's'"></span>
              </button>
            </div>
            <div class="relative">
              <input type="text" maxlength="6" x-model="otpCode"
                class="w-full text-center tracking-[0.5em] py-3.5 rounded-xl bg-gray-50 border-2 border-transparent focus:bg-white focus:border-black outline-none font-mono text-lg transition-all"
                placeholder="000000">
              <div x-show="otpSent" x-transition
                class="absolute -bottom-5 left-1 text-[9px] text-green-600 font-bold uppercase">
                <i class="fas fa-check-circle mr-1"></i> OTP sent to registered device
              </div>
            </div>
          </div>

          <button type="submit" :disabled="isLoading"
            class="w-full py-4 rounded-xl bg-gradient text-white font-bold text-sm shadow-lg active:scale-[0.97] transition-all flex items-center justify-center gap-3 mt-4">
            <span x-show="!isLoading">Authorize & Enter</span>
            <svg x-show="isLoading" class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none">
              </circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </button>

          <div class="flex items-center gap-4 py-2">
            <div class="flex-grow h-px bg-gray-100"></div>
            <span class="text-[10px] font-bold text-gray-400 uppercase">New here?</span>
            <div class="flex-grow h-px bg-gray-100"></div>
          </div>

          <a href="become_partner.html"
            class="w-full py-3 rounded-xl border-2 border-dashed border-gray-200 text-gray-600 font-bold text-xs flex items-center justify-center gap-2 hover:bg-orange-50 hover:border-orange-200 transition-all">
            <i class="fas fa-handshake text-orange-500"></i>
            Become a Bihar Yaatra Partner
          </a>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    // 1. Import Firebase
    import { auth, signInWithEmailAndPassword } from './assets/js/firebase-config.js';

    // 2. Import Alpine and Plugins manually
    import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/module.esm.js';
    import collapse from 'https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.14.8/dist/module.esm.js';

    // 3. Register Plugin
    Alpine.plugin(collapse);

    // 4. Define Logic
    window.loginApp = function () {
      return {
        category: 'admin',
        role: 'super_admin',
        email: '',
        password: '',
        otpCode: '',      // Stores what the user types
        generatedOTP: '', // Stores the actual correct code
        otpTimer: 0,
        otpSent: false,
        otpLoading: false,
        showPass: false,
        isLoading: false,
        capsLockOn: false,
        greeting: 'Hello',
        placeholders: { email: 'root@biharyaatra.com' },

        init() {
          this.updateGreeting();
          setInterval(() => this.updateGreeting(), 60000);
          window.addEventListener('keydown', (e) => { if (e.getModifierState) this.capsLockOn = e.getModifierState("CapsLock"); });
        },

        updateGreeting() {
          const hours = new Date().getHours();
          if (hours < 12) this.greeting = 'Good Morning';
          else if (hours < 17) this.greeting = 'Good Afternoon';
          else this.greeting = 'Good Evening';
        },

        sendOTP() {
          this.otpLoading = true;

          // 1. Generate a random 6-digit code
          this.generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

          // 2. Simulate Network Delay
          setTimeout(() => {
            this.otpLoading = false;
            this.otpSent = true;
            this.otpTimer = 60;

            // 3. SIMULATION: Show the code to the user (In production, this would be an SMS)
            alert(`[SECURE SYSTEM]\nYour Verification Code is: ${this.generatedOTP}`);
            console.log("Your Login OTP is:", this.generatedOTP);

            // Start Countdown
            let interval = setInterval(() => {
              this.otpTimer--;
              if (this.otpTimer <= 0) {
                clearInterval(interval);
                this.generatedOTP = ''; // Expire the code after 60s
              }
            }, 1000);
          }, 1500);
        },

        setRole(newRole) {
          this.role = newRole;
          const phs = {
            'super_admin': 'root@biharyaatra.com',
            'admin': 'regional@biharyaatra.com',
            'homestay': 'host-id@homestay.com',
            'transport': 'fleet@trans.com',
            'guide': 'guide@tours.com'
          };
          this.placeholders.email = phs[newRole];
          this.otpSent = false;
          this.otpCode = '';
          this.generatedOTP = '';
        },

        async login() {
          // --- VERIFICATION LOGIC START ---
          if (this.category === 'admin') {
            if (!this.generatedOTP) {
              alert("Security Alert: Please click 'Get OTP' to verify your identity.");
              return;
            }
            if (this.otpCode !== this.generatedOTP) {
              alert("Access Denied: Invalid Verification Code.");
              return;
            }
          }
          // --- VERIFICATION LOGIC END ---

          this.isLoading = true;

          try {
            // 1. Authenticate with Firebase
            const userCredential = await signInWithEmailAndPassword(auth, this.email, this.password);
            const user = userCredential.user;
            console.log("Login successful:", user.uid);

            // 2. Redirect Logic
            let redirectUrl = '';
            switch (this.role) {
              case 'super_admin':
                redirectUrl = 'admin_create.html';
                break;  // FIXED: was missing break — fell through to cms.html always
              case 'admin':
                redirectUrl = 'pannel/admin/cms.html';
                break;
              case 'homestay':
                redirectUrl = 'pannel/homestay/Index.html';
                break;
              case 'transport':
                redirectUrl = 'pannel/transport/transport_dashboard.html';
                break;
              case 'guide':
                redirectUrl = 'pannel/guide/guide_dashboard.html';
                break;
              default:
                redirectUrl = 'pannel/users/index.html';
            }

            // 3. Success Feedback
            // Note: We don't alert here anymore to make it feel faster, just redirect
            window.location.href = redirectUrl;

          } catch (error) {
            console.error("Login Error:", error.code, error.message);
            let msg = "Authentication failed. Please check your credentials.";
            // Firebase v9+ uses 'auth/invalid-credential' for wrong email/password
            if (error.code === 'auth/invalid-credential') msg = "Invalid email or password. Please try again.";
            if (error.code === 'auth/wrong-password') msg = "Incorrect password.";
            if (error.code === 'auth/user-not-found') msg = "No account found with this email.";
            if (error.code === 'auth/invalid-email') msg = "Please enter a valid email address.";
            if (error.code === 'auth/too-many-requests') msg = "Too many failed attempts. Please wait a moment.";
            if (error.code === 'auth/user-disabled') msg = "This account has been disabled. Contact support.";
            if (error.code === 'auth/network-request-failed') msg = "Network error. Check your internet connection.";
            alert(msg);
          } finally {
            this.isLoading = false;
          }
        }
      }
    };

    // 5. Start Alpine
    window.Alpine = Alpine;
    Alpine.start();
  </script>
</body>

</html>
