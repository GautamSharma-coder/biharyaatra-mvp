<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - Bihar Yaatra</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-primary: #FF7D29;
            --color-secondary: #138808;
            --color-dark: #1E1E1E;
        }
    </style>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FAFAFA; }
        .font-display { font-family: 'Outfit', sans-serif; }
        [x-cloak] { display: none !important; }
        .text-gradient {
            background: linear-gradient(90deg, #FF7D29, #EC4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body class="text-gray-800" x-data="tripsApp()">

    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-500 hover:bg-orange-50 hover:text-orange-600 transition">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="font-display font-bold text-xl text-gray-900">My Journeys</h1>
            </div>
            <a href="../../pages/aiplanner.html" class="bg-black text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-orange-600 transition flex items-center gap-2 shadow-lg">
                <i class="fas fa-plus"></i> <span class="hidden sm:inline">Plan New Trip</span>
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8 min-h-screen">
        
        <div class="flex gap-2 mb-8 overflow-x-auto pb-2">
            <button @click="filter = 'all'" :class="filter === 'all' ? 'bg-orange-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'" class="px-5 py-2 rounded-full text-sm font-bold transition whitespace-nowrap">
                All Trips
            </button>
            <button @click="filter = 'upcoming'" :class="filter === 'upcoming' ? 'bg-orange-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'" class="px-5 py-2 rounded-full text-sm font-bold transition whitespace-nowrap">
                Upcoming
            </button>
            <button @click="filter = 'completed'" :class="filter === 'completed' ? 'bg-orange-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'" class="px-5 py-2 rounded-full text-sm font-bold transition whitespace-nowrap">
                Completed
            </button>
        </div>

        <div x-show="loading" class="flex flex-col items-center justify-center py-32 text-gray-400">
            <div class="w-12 h-12 border-4 border-orange-100 border-t-orange-500 rounded-full animate-spin mb-4"></div>
            <p class="font-medium text-sm animate-pulse">Loading itineraries...</p>
        </div>

        <div x-show="!loading && filteredTrips.length === 0" x-cloak class="flex flex-col items-center justify-center py-24 text-center bg-white rounded-[2rem] border border-dashed border-gray-200 shadow-sm">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6 text-blue-400 text-3xl shadow-sm">
                <i class="fas fa-map-location-dot"></i>
            </div>
            <h3 class="font-display font-bold text-2xl text-gray-900 mb-2">No trips found</h3>
            <p class="text-gray-500 mb-8 max-w-xs mx-auto leading-relaxed">It looks like you haven't planned any trips in this category yet.</p>
            <a href="../../pages/aiplanner.html" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition transform hover:-translate-y-1">
                Start Planning
            </a>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" x-cloak>
            <template x-for="trip in filteredTrips" :key="trip.id">
                <div class="group bg-white rounded-[2rem] overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col h-full relative">
                    
                    <button @click.prevent="deleteTrip(trip.id)" class="absolute top-4 right-4 z-20 w-8 h-8 bg-white/20 backdrop-blur-md text-white rounded-full flex items-center justify-center hover:bg-red-500 transition opacity-0 group-hover:opacity-100">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>

                    <div class="h-56 relative overflow-hidden bg-gray-200">
                        <a :href="'view_trip.html?id=' + trip.id">
                            <img :src="trip.image || 'https://images.unsplash.com/photo-1627894006066-b44642735b52?q=80&w=800'" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        </a>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        
                        <div class="absolute bottom-4 left-4 text-white">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide border border-white/30 backdrop-blur-sm"
                                      :class="trip.status === 'upcoming' ? 'bg-blue-500/80' : (trip.status === 'completed' ? 'bg-green-500/80' : 'bg-gray-500/80')"
                                      x-text="trip.status || 'Draft'"></span>
                            </div>
                            <h3 class="font-display font-bold text-xl leading-tight" x-text="trip.title"></h3>
                        </div>
                    </div>

                    <div class="p-6 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Dates</p>
                                <p class="text-sm font-bold text-gray-700 flex items-center gap-2">
                                    <i class="far fa-calendar-alt text-orange-500"></i>
                                    <span x-text="formatDateRange(trip.startDate, trip.endDate)"></span>
                                </p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Duration</p>
                                <p class="text-sm font-bold text-gray-700"><span x-text="trip.days"></span> Days</p>
                            </div>
                        </div>

                        <p class="text-gray-500 text-sm line-clamp-2 mb-6 flex-1" x-text="trip.description || 'No description available.'"></p>

                        <div class="pt-4 border-t border-gray-50 flex items-center justify-between">
                            <div class="flex -space-x-2">
                                <template x-for="i in 3">
                                    <div class="w-8 h-8 rounded-full bg-gray-100 border-2 border-white flex items-center justify-center text-xs text-gray-400">
                                        <i class="fas fa-user"></i>
                                    </div>
                                </template>
                            </div>
                            <a :href="'view_trip.html?id=' + trip.id" class="text-sm font-bold text-orange-600 hover:text-orange-700 flex items-center gap-1 group/link">
                                View Itinerary <i class="fas fa-arrow-right text-xs group-hover/link:translate-x-1 transition-transform"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div id="footer-container"></div>
    <script>
      fetch('../../components/footer.html').then(res => res.text()).then(html => {
          // Adjust paths in footer if necessary or insert as is
          // Note: Footer paths might need ../ adjustments relative to pannel/users/
          // For simplicity inserting content.
          const temp = document.createElement('div');
          temp.innerHTML = html.replace(/src="\.\.\//g, 'src="../../').replace(/href="\.\.\//g, 'href="../../');
          document.getElementById('footer-container').innerHTML = temp.innerHTML;
      });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO1bKiSsTHCsGlgFXm_-D2gbFBqXdWQuE",
            authDomain: "biharyaatra-t.firebaseapp.com",
            projectId: "biharyaatra-t",
            storageBucket: "biharyaatra-t.firebasestorage.app",
            messagingSenderId: "101220485604",
            appId: "1:101220485604:web:e96c3230ee36de85ba1ff1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.auth = auth;
        window.db = db;
        window.appId = appId;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('tripsApp', () => ({
                trips: [],
                loading: true,
                user: null,
                filter: 'all',

                init() {
                    const checkDeps = () => {
                        if(window.auth && window.onAuthStateChanged) {
                            this.initAuth();
                        } else {
                            setTimeout(checkDeps, 50);
                        }
                    };
                    checkDeps();
                },

                initAuth() {
                    window.onAuthStateChanged(window.auth, (user) => {
                        if(user) {
                            this.user = user;
                            this.fetchTrips(user.uid);
                        } else {
                            window.location.href = '../../pages/auth.html';
                        }
                    });
                },

                fetchTrips(uid) {
                    try {
                        const tripsRef = window.collection(window.db, 'artifacts', window.appId, 'users', uid, 'trips');
                        // Real-time listener
                        window.onSnapshot(tripsRef, (snapshot) => {
                            this.trips = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                                .sort((a, b) => {
                                    // Sort upcoming first by start date, then others by creation
                                    const dateA = new Date(a.startDate || 0);
                                    const dateB = new Date(b.startDate || 0);
                                    return dateB - dateA;
                                });
                            this.loading = false;
                        });
                    } catch(e) {
                        console.error(e);
                        this.loading = false;
                    }
                },

                async deleteTrip(id) {
                    if(!confirm("Are you sure you want to delete this trip?")) return;
                    try {
                        await window.deleteDoc(window.doc(window.db, 'artifacts', window.appId, 'users', this.user.uid, 'trips', id));
                    } catch(e) {
                        console.error("Delete failed", e);
                        alert("Failed to delete trip");
                    }
                },

                get filteredTrips() {
                    if (this.filter === 'all') return this.trips;
                    return this.trips.filter(t => (t.status || 'draft').toLowerCase() === this.filter);
                },

                formatDateRange(start, end) {
                    if(!start) return 'Dates TBD';
                    const s = new Date(start);
                    const e = end ? new Date(end) : null;
                    return s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + 
                           (e ? ' - ' + e.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '');
                }
            }));
        });
    </script>
</body>
</html>
