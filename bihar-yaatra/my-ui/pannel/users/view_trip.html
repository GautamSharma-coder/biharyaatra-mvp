<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Details - Bihar Yaatra</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #FF7D29; 
      --color-secondary: #138808;
      --color-dark: #1E1E1E;
    }
  </style>

  <style>
    body { font-family: 'Space Grotesk', sans-serif; background-color: #FAFAFA; }
    .font-display { font-family: 'Syne', sans-serif; }
    [x-cloak] { display: none !important; }
    .text-gradient {
      background: linear-gradient(90deg, #FF9933, #EC4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    
    /* Timeline Line */
    .timeline-line::before {
        content: ''; position: absolute; left: 19px; top: 40px; bottom: -20px;
        width: 2px; background: #f3f4f6; z-index: 0;
    }
    .timeline-item:last-child .timeline-line::before { display: none; }
  </style>
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="text-gray-800 h-screen overflow-hidden flex" x-data="viewTripApp()">

  <div x-show="mobileMenu" @click="mobileMenu = false" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 lg:hidden" x-transition.opacity x-cloak></div>

  <aside :class="mobileMenu ? 'translate-x-0' : 'translate-x-full lg:translate-x-0'" 
         class="fixed inset-y-0 right-0 lg:static lg:inset-auto z-50 w-72 h-full bg-white lg:border-r border-l lg:border-l-0 border-gray-100 flex flex-col transition-transform duration-300 shadow-2xl lg:shadow-none">
      
      <div class="p-8 pb-4">
          <a href="../../index.html" class="font-display font-extrabold text-2xl tracking-tight flex items-center gap-2 text-gray-900">
              Bihar<span class="text-gradient">Yaatra</span>
          </a>
      </div>

      <nav class="flex-1 overflow-y-auto py-4 px-5 space-y-1.5 custom-scroll">
          <a href="index.html" class="flex items-center gap-3.5 px-4 py-3.5 font-medium text-gray-500 hover:bg-orange-50 hover:text-orange-600 rounded-xl transition-all">
              <i class="fas fa-grid-2 w-5 text-center"></i> Dashboard
          </a>
          <a href="#" class="flex items-center gap-3.5 px-4 py-3.5 font-medium bg-orange-500 text-white rounded-xl shadow-lg shadow-orange-200 transition-all">
              <i class="fas fa-map-location-dot w-5 text-center"></i> Trip Details
          </a>
          <a href="index.html" class="flex items-center gap-3.5 px-4 py-3.5 font-medium text-gray-500 hover:bg-orange-50 hover:text-orange-600 rounded-xl transition-all">
              <i class="fas fa-arrow-left w-5 text-center"></i> Back
          </a>
      </nav>
  </aside>

  <main class="flex-1 h-full overflow-y-auto custom-scroll bg-[#FAFAFA] relative w-full flex flex-col">
      
      <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center">
          <div class="flex items-center gap-4">
              <button @click="mobileMenu = true" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-600">
                  <i class="fas fa-bars"></i>
              </button>
              <h1 class="text-xl font-bold font-display text-gray-900 hidden sm:block">Trip Itinerary</h1>
          </div>
          <div class="flex items-center gap-3">
              <button @click="deleteTrip()" class="px-4 py-2 text-red-500 hover:bg-red-50 rounded-lg text-sm font-bold transition">
                  <i class="fas fa-trash-alt mr-1"></i> Delete
              </button>
              <button @click="window.print()" class="bg-black text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-gray-800 transition flex items-center gap-2">
                  <i class="fas fa-download"></i> <span class="hidden sm:inline">Download PDF</span>
              </button>
          </div>
      </header>

      <div class="p-6 lg:p-10 max-w-5xl mx-auto w-full">
          
          <div x-show="loading" class="flex flex-col items-center justify-center py-40 text-gray-400">
              <i class="fas fa-circle-notch fa-spin text-3xl text-orange-500 mb-4"></i>
              <p>Fetching your itinerary...</p>
          </div>

          <div x-show="!loading && trip" x-cloak class="space-y-8">
              
              <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-lg border border-gray-100 relative group">
                  <div class="h-64 overflow-hidden relative">
                      <img :src="trip?.image || 'https://images.unsplash.com/photo-1628063597843-085732c57569?q=80&w=1200'" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                      <div class="absolute bottom-8 left-8 text-white">
                          <span class="bg-orange-500 text-white px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider mb-3 inline-block shadow-md" x-text="trip?.status"></span>
                          <h1 class="text-4xl md:text-5xl font-display font-bold mb-2" x-text="trip?.title"></h1>
                          <p class="text-gray-200 flex items-center gap-2 text-sm md:text-base">
                              <i class="far fa-calendar-alt"></i> <span x-text="formatDateRange(trip?.startDate, trip?.endDate)"></span>
                              <span class="mx-2">•</span>
                              <i class="fas fa-map-marker-alt"></i> <span x-text="trip?.days + ' Days'"></span>
                          </p>
                      </div>
                  </div>
              </div>

              <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  
                  <div class="lg:col-span-2">
                      <h3 class="text-2xl font-display font-bold mb-6 flex items-center gap-2">
                          <span class="w-8 h-8 bg-black text-white rounded-full flex items-center justify-center text-sm"><i class="fas fa-list-ul"></i></span>
                          Day-by-Day Plan
                      </h3>

                      <div class="space-y-0">
                          <template x-for="(day, index) in parsedItinerary" :key="index">
                              <div class="timeline-item relative pb-8 pl-10 timeline-line">
                                  <div class="absolute left-0 top-0 w-10 h-10 bg-white border-2 border-orange-100 rounded-full flex items-center justify-center font-bold text-orange-500 shadow-sm z-10" x-text="day.day"></div>
                                  
                                  <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition">
                                      <h4 class="font-bold text-lg text-gray-900 mb-2" x-text="day.title"></h4>
                                      
                                      <ul class="space-y-3 mb-4">
                                          <template x-for="act in day.activities">
                                              <li class="flex items-start gap-3 text-gray-600 text-sm">
                                                  <i class="fas fa-check-circle text-green-500 mt-1 shrink-0"></i>
                                                  <span x-text="act"></span>
                                              </li>
                                          </template>
                                      </ul>

                                      <div class="flex items-center gap-3 bg-orange-50 p-3 rounded-xl border border-orange-100" x-show="day.food">
                                          <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-orange-500 shrink-0 text-xs shadow-sm">
                                              <i class="fas fa-utensils"></i>
                                          </div>
                                          <div>
                                              <p class="text-[10px] font-bold text-orange-400 uppercase tracking-wide">Must Try</p>
                                              <p class="text-sm font-bold text-gray-800" x-text="day.food"></p>
                                          </div>
                                      </div>
                                  </div>
                              </div>
                          </template>
                      </div>
                  </div>

                  <div class="space-y-6">
                      
                      <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
                          <h3 class="font-bold text-lg mb-4">Trip Summary</h3>
                          <p class="text-gray-500 text-sm mb-6 leading-relaxed" x-text="trip?.description"></p>
                          
                          <div class="space-y-3">
                              <div class="flex justify-between text-sm p-3 bg-gray-50 rounded-xl">
                                  <span class="text-gray-500">Duration</span>
                                  <span class="font-bold text-gray-900" x-text="trip?.days + ' Days'"></span>
                              </div>
                              <div class="flex justify-between text-sm p-3 bg-gray-50 rounded-xl">
                                  <span class="text-gray-500">Travelers</span>
                                  <span class="font-bold text-gray-900">2 Adults</span>
                              </div>
                              <div class="flex justify-between text-sm p-3 bg-gray-50 rounded-xl">
                                  <span class="text-gray-500">Budget</span>
                                  <span class="font-bold text-green-600">Standard</span>
                              </div>
                          </div>
                      </div>

                      <div class="bg-gradient-to-br from-gray-900 to-black text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden">
                          <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                          <h3 class="font-bold text-lg mb-2 relative z-10">Need a Ride?</h3>
                          <p class="text-gray-400 text-sm mb-6 relative z-10">Book verified cabs for your trip.</p>
                          <a href="../../pages/transport.html" class="block w-full py-3 bg-white text-black font-bold text-center rounded-xl hover:bg-gray-200 transition relative z-10">
                              Book Transport
                          </a>
                      </div>

                  </div>
              </div>

          </div>
      </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAO1bKiSsTHCsGlgFXm_-D2gbFBqXdWQuE",
      authDomain: "biharyaatra-t.firebaseapp.com",
      projectId: "biharyaatra-t",
      storageBucket: "biharyaatra-t.firebasestorage.app",
      messagingSenderId: "101220485604",
      appId: "1:101220485604:web:e96c3230ee36de85ba1ff1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    window.auth = auth;
    window.db = db;
    window.appId = appId;
    window.doc = doc;
    window.getDoc = getDoc;
    window.deleteDoc = deleteDoc;
    window.onAuthStateChanged = onAuthStateChanged;
  </script>

  <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('viewTripApp', () => ({
            mobileMenu: false,
            loading: true,
            user: null,
            trip: null,
            parsedItinerary: [],

            init() {
                const checkDeps = () => {
                    if (window.auth && window.db) {
                        this.start();
                    } else {
                        setTimeout(checkDeps, 50);
                    }
                };
                checkDeps();
            },

            start() {
                window.onAuthStateChanged(window.auth, (u) => {
                    if (u) {
                        this.user = u;
                        const params = new URLSearchParams(window.location.search);
                        const id = params.get('id');
                        if (id) {
                            this.fetchTrip(id);
                        } else {
                            alert("No Trip ID provided.");
                            window.location.href = 'index.html';
                        }
                    } else {
                        window.location.href = '../../pages/auth.html';
                    }
                });
            },

            async fetchTrip(tripId) {
                try {
                    const docRef = window.doc(window.db, 'artifacts', window.appId, 'users', this.user.uid, 'trips', tripId);
                    const snap = await window.getDoc(docRef);

                    if (snap.exists()) {
                        this.trip = { id: snap.id, ...snap.data() };
                        
                        // Parse itinerary: Handles both AI JSON structure and manual array
                        if (this.trip.fullItinerary && this.trip.fullItinerary.days) {
                            this.parsedItinerary = this.trip.fullItinerary.days;
                        } else if (Array.isArray(this.trip.itinerary)) {
                            this.parsedItinerary = this.trip.itinerary;
                        } else {
                            // Fallback if structure varies
                            this.parsedItinerary = [
                                { day: 1, title: 'Arrival & Check-in', activities: ['Relax at hotel', 'Local market visit'] }
                            ];
                        }
                    } else {
                        alert("Trip not found!");
                        window.location.href = 'index.html';
                    }
                } catch (e) {
                    console.error("Error fetching trip:", e);
                } finally {
                    this.loading = false;
                }
            },

            async deleteTrip() {
                if (!confirm("Are you sure you want to delete this trip?")) return;
                
                try {
                    await window.deleteDoc(window.doc(window.db, 'artifacts', window.appId, 'users', this.user.uid, 'trips', this.trip.id));
                    alert("Trip deleted.");
                    window.location.href = 'index.html';
                } catch (e) {
                    console.error("Delete failed", e);
                    alert("Could not delete trip.");
                }
            },

            formatDateRange(start, end) {
                if(!start) return 'Dates TBD';
                const s = new Date(start);
                const e = end ? new Date(end) : null;
                return s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + 
                       (e ? ' - ' + e.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '');
            }
        }));
    });
  </script>
</body>
</html>
