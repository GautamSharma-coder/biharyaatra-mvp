<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Bihar Yaatra</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-primary: #FF7D29;
            --color-secondary: #138808;
            --color-dark: #1E1E1E;
        }
    </style>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAFAFA;
        }
        .font-display { font-family: 'Outfit', sans-serif; }
        [x-cloak] { display: none !important; }
        
        /* Custom Scrollbar for list */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800" x-data="bookingsApp()">

    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 transition-all duration-300">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-500 hover:bg-orange-50 hover:text-orange-600 transition">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1 class="font-display font-bold text-xl text-gray-900">My Bookings</h1>
            </div>
            <div class="flex items-center gap-3">
                 <span class="text-xs font-bold text-green-700 bg-green-50 border border-green-100 px-3 py-1.5 rounded-full flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    Live Updates
                 </span>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-8">
        
        <div x-show="loading" class="flex flex-col items-center justify-center py-32 text-gray-400">
            <div class="w-12 h-12 border-4 border-orange-100 border-t-orange-500 rounded-full animate-spin mb-4"></div>
            <p class="font-medium text-sm animate-pulse">Loading your journey...</p>
        </div>

        <div x-show="!loading && bookings.length === 0" x-cloak class="flex flex-col items-center justify-center py-24 text-center bg-white rounded-[2rem] border border-dashed border-gray-200 shadow-sm mx-auto max-w-lg">
            <div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mb-6 text-orange-400 text-3xl shadow-sm">
                <i class="fas fa-ticket-alt"></i>
            </div>
            <h3 class="font-display font-bold text-2xl text-gray-900 mb-2">No active bookings</h3>
            <p class="text-gray-500 mb-8 max-w-xs mx-auto leading-relaxed">You haven't booked any homestays or trips yet. Start your adventure today!</p>
            <a href="../../pages/packages.html" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-gray-200 hover:bg-orange-600 hover:shadow-orange-200 transition transform hover:-translate-y-1">
                Explore Packages
            </a>
        </div>

        <div x-show="!loading && bookings.length > 0" x-cloak class="space-y-5">
            <template x-for="booking in bookings" :key="booking.id">
                <div class="bg-white rounded-[1.5rem] p-6 border border-gray-100 shadow-sm hover:shadow-xl hover:border-orange-100 transition-all duration-300 group relative overflow-hidden">
                    
                    <div class="absolute top-0 right-0 w-32 h-32 bg-orange-50/50 rounded-bl-[4rem] -mr-8 -mt-8 z-0"></div>

                    <div class="relative z-10 flex flex-col md:flex-row justify-between gap-6">
                        
                        <div class="flex items-start gap-5">
                            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-2xl shrink-0 shadow-sm border border-white"
                                 :class="booking.type === 'Hotel' || booking.serviceType === 'homestay' ? 'bg-purple-50 text-purple-500' : (booking.type === 'Package' ? 'bg-orange-50 text-orange-500' : 'bg-blue-50 text-blue-500')">
                                <i :class="getIcon(booking)"></i>
                            </div>
                            
                            <div>
                                <div class="flex flex-wrap items-center gap-2 mb-1.5">
                                    <h3 class="font-display font-bold text-lg text-gray-900 leading-tight" x-text="booking.title || booking.serviceName || 'Booking'"></h3>
                                    <span class="px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider border"
                                          :class="{
                                            'bg-green-50 text-green-700 border-green-100': booking.status === 'Confirmed',
                                            'bg-yellow-50 text-yellow-700 border-yellow-100': booking.status === 'Pending',
                                            'bg-red-50 text-red-700 border-red-100': booking.status === 'Cancelled'
                                          }" x-text="booking.status || 'Pending'"></span>
                                </div>
                                <p class="text-sm text-gray-500 font-medium mb-1" x-text="booking.subtitle || 'Service Details'"></p>
                                <div class="flex items-center gap-3 text-xs text-gray-400 font-bold uppercase tracking-wider">
                                    <span><i class="far fa-calendar mr-1"></i> <span x-text="formatDate(booking.date || booking.checkIn || booking.bookingDate)"></span></span>
                                    <span x-show="booking.guests">• <i class="fas fa-user-group mr-1"></i> <span x-text="booking.guests"></span> Guests</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col items-end justify-between pl-4 md:border-l border-gray-100 min-w-[140px]">
                            <div class="text-right">
                                <p class="text-xs text-gray-400 font-bold uppercase mb-0.5">Total Paid</p>
                                <span class="font-display font-bold text-2xl text-gray-900 tracking-tight">₹<span x-text="booking.price || booking.totalAmount || '0'"></span></span>
                            </div>
                            
                            <div class="flex gap-3 mt-4 w-full md:w-auto">
                                <button class="flex-1 md:flex-none px-4 py-2 rounded-xl bg-gray-50 text-gray-600 text-xs font-bold hover:bg-gray-100 transition border border-gray-200">
                                    <i class="fas fa-file-invoice mr-1"></i> Invoice
                                </button>
                                <button class="flex-1 md:flex-none px-4 py-2 rounded-xl bg-black text-white text-xs font-bold hover:bg-orange-600 transition shadow-lg shadow-gray-200 hover:shadow-orange-200">
                                    View Details
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </template>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO1bKiSsTHCsGlgFXm_-D2gbFBqXdWQuE",
            authDomain: "biharyaatra-t.firebaseapp.com",
            projectId: "biharyaatra-t",
            storageBucket: "biharyaatra-t.firebasestorage.app",
            messagingSenderId: "101220485604",
            appId: "1:101220485604:web:e96c3230ee36de85ba1ff1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Expose to Alpine
        window.auth = auth;
        window.db = db;
        window.appId = appId;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
    </script>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('bookingsApp', () => ({
                bookings: [],
                loading: true,
                user: null,

                init() {
                    const checkDeps = () => {
                        if(window.auth && window.onAuthStateChanged) {
                            this.initAuth();
                        } else {
                            setTimeout(checkDeps, 50);
                        }
                    };
                    checkDeps();
                },

                initAuth() {
                    window.onAuthStateChanged(window.auth, (user) => {
                        if(user) {
                            this.user = user;
                            this.fetchBookings(user.uid);
                        } else {
                            // Strict redirect if not logged in
                            window.location.href = '../../pages/auth.html';
                        }
                    });
                },

                fetchBookings(uid) {
                    try {
                        const bookingsRef = window.collection(window.db, 'artifacts', window.appId, 'users', uid, 'bookings');
                        // Real-time listener
                        window.onSnapshot(bookingsRef, (snapshot) => {
                            this.bookings = snapshot.docs.map(doc => {
                                const data = doc.data();
                                return { id: doc.id, ...data };
                            }).sort((a, b) => {
                                // Sort by date descending
                                const dateA = this.parseDate(a.date || a.bookingDate || a.createdAt);
                                const dateB = this.parseDate(b.date || b.bookingDate || b.createdAt);
                                return dateB - dateA;
                            });
                            
                            this.loading = false;
                        }, (err) => {
                            console.error("Error fetching bookings:", err);
                            this.loading = false;
                        });
                    } catch(e) {
                        console.error(e);
                        this.loading = false;
                    }
                },

                getIcon(booking) {
                    if (booking.type === 'Hotel' || booking.serviceType === 'homestay') return 'fas fa-bed';
                    if (booking.type === 'Taxi' || booking.serviceType === 'transport') return 'fas fa-taxi';
                    if (booking.type === 'Package') return 'fas fa-map-marked-alt';
                    return 'fas fa-ticket-alt';
                },

                parseDate(dateVal) {
                    if (!dateVal) return new Date(0);
                    if (dateVal.seconds) return new Date(dateVal.seconds * 1000);
                    return new Date(dateVal);
                },

                formatDate(dateVal) {
                    if (!dateVal) return 'Date N/A';
                    const date = this.parseDate(dateVal);
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                }
            }));
        });
    </script>
</body>
</html>
