<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bihar Yaatra - Admin CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- FIXED: Removed defer CDN Alpine tag — Alpine now loaded as ESM module below to avoid race condition -->

  <style>
    body {
      font-family: "Space Grotesk", sans-serif;
      background-color: #f3f4f6;
    }

    .font-display {
      font-family: "Syne", sans-serif;
    }

    [x-cloak] {
      display: none !important;
    }
  </style>
</head>

<body x-data="cmsApp()" class="text-gray-800 h-screen flex overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col shrink-0 transition-all duration-300"
    :class="sidebarOpen ? 'translate-x-0' : '-translate-x-64 md:translate-x-0 absolute md:relative h-full z-50'">
    <div class="p-6 flex items-center gap-3 border-b border-gray-800">
      <div class="w-8 h-8 bg-gradient-to-tr from-orange-500 to-pink-500 rounded-lg"></div>
      <h1 class="font-display font-bold text-xl tracking-wide">
        Admin<span class="text-orange-500">CMS</span>
      </h1>
    </div>

    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
      <template x-for="item in navItems">
        <a href="#" @click.prevent="activeTab = item.id; fetchData(item.id)"
          :class="activeTab === item.id ? 'bg-orange-600 text-white shadow-lg shadow-orange-900/50' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
          class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium">
          <i :class="item.icon" class="w-5 text-center"></i>
          <span x-text="item.label"></span>
        </a>
      </template>
    </nav>

    <div class="p-4 border-t border-gray-800">
      <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-800">
        <div class="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center font-bold text-xs"
          x-text="adminEmail ? adminEmail.charAt(0).toUpperCase() : 'A'"></div>
        <div class="flex-1 min-w-0">
          <!-- FIXED: Dynamic admin email from Firebase Auth -->
          <p class="text-sm font-bold truncate" x-text="adminEmail || 'Admin'"></p>
          <p class="text-xs text-gray-500 truncate" x-text="adminRole || 'Manager'"></p>
        </div>
      </div>
      <button @click="logout" class="w-full mt-3 text-xs text-gray-500 hover:text-white flex items-center gap-2 px-2">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 md:px-8">
      <button @click="sidebarOpen = !sidebarOpen" class="md:hidden text-gray-500 text-xl">
        <i class="fas fa-bars"></i>
      </button>
      <h2 class="font-bold text-lg capitalize" x-text="activeTab"></h2>
      <div class="flex items-center gap-4">
        <button @click="openModal()"
          class="bg-black hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-md flex items-center gap-2">
          <i class="fas fa-plus"></i>
          <span x-text="'Add ' + activeTab.slice(0, -1)"></span>
        </button>
      </div>
    </header>

    <!-- Content Area -->
    <div class="flex-1 overflow-auto p-6 md:p-8">
      <!-- Dashboard View -->
      <div x-show="activeTab === 'dashboard'" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-xl">
              <i class="fas fa-box-open"></i>
            </div>
            <span class="text-3xl font-bold font-display" x-text="stats.packages">0</span>
          </div>
          <h3 class="text-gray-500 font-medium">Active Packages</h3>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <div class="w-12 h-12 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-xl">
              <i class="fas fa-map-marked-alt"></i>
            </div>
            <span class="text-3xl font-bold font-display" x-text="stats.destinations">0</span>
          </div>
          <h3 class="text-gray-500 font-medium">Destinations</h3>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-xl">
              <i class="fas fa-home"></i>
            </div>
            <span class="text-3xl font-bold font-display" x-text="stats.homestays">0</span>
          </div>
          <h3 class="text-gray-500 font-medium">Homestays</h3>
        </div>

        <div
          class="col-span-1 md:col-span-3 bg-blue-50 p-6 rounded-2xl border border-blue-100 flex items-start gap-4 mt-4">
          <i class="fas fa-info-circle text-blue-500 mt-1"></i>
          <div>
            <h4 class="font-bold text-blue-900">Welcome to the CMS</h4>
            <p class="text-sm text-blue-700 mt-1">
              Select a module from the sidebar to manage content. All changes
              are reflected immediately on the live website.
            </p>
          </div>
        </div>
      </div>

      <!-- List Views (Generic for Packages, Destinations, Homestays) -->
      <div x-show="activeTab !== 'dashboard'" x-cloak>
        <div x-show="loading" class="flex justify-center py-20">
          <i class="fas fa-circle-notch fa-spin text-3xl text-gray-300"></i>
        </div>

        <div x-show="!loading && items.length === 0"
          class="text-center py-20 bg-white rounded-2xl border border-dashed border-gray-200">
          <p class="text-gray-400">No items found.</p>
        </div>

        <div x-show="!loading && items.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <template x-for="item in items" :key="item.id">
            <div
              class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition border border-gray-100 group relative">
              <div class="h-48 overflow-hidden bg-gray-100 relative">
                <img :src="item.image || 'https://via.placeholder.com/400x300?text=No+Image'"
                  class="w-full h-full object-cover" />
                <div class="absolute top-2 right-2 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button @click="openModal(item)"
                    class="w-8 h-8 rounded-full bg-white text-blue-600 shadow-md flex items-center justify-center hover:bg-blue-50">
                    <i class="fas fa-pencil-alt text-xs"></i>
                  </button>
                  <button @click="deleteItem(item.id)"
                    class="w-8 h-8 rounded-full bg-white text-red-500 shadow-md flex items-center justify-center hover:bg-red-50">
                    <i class="fas fa-trash text-xs"></i>
                  </button>
                </div>
              </div>
              <div class="p-5">
                <div class="flex justify-between items-start mb-2">
                  <h3 class="font-bold text-lg leading-tight truncate pr-2" x-text="item.title || item.name"></h3>
                  <span x-show="item.price" class="text-xs font-bold bg-green-50 text-green-700 px-2 py-1 rounded-md"
                    x-text="item.price"></span>
                </div>
                <p class="text-gray-500 text-sm line-clamp-2 mb-3" x-text="item.description"></p>
                <div class="flex items-center gap-2 text-xs text-gray-400 font-medium">
                  <span x-show="item.category" class="bg-gray-100 px-2 py-0.5 rounded" x-text="item.category"></span>
                  <span x-show="item.duration" class="bg-gray-100 px-2 py-0.5 rounded" x-text="item.duration"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Form -->
  <div x-show="isModalOpen"
    class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" x-cloak>
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden"
      @click.outside="closeModal">
      <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <h3 class="font-bold text-lg"
          x-text="editMode ? 'Edit ' + activeTab.slice(0, -1) : 'Add New ' + activeTab.slice(0, -1)"></h3>
        <button @click="closeModal" class="text-gray-400 hover:text-gray-900">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="p-6 overflow-y-auto custom-scrollbar">
        <form @submit.prevent="saveItem" class="space-y-4">
          <!-- Common Fields -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Title / Name</label>
              <input type="text" x-model="formData.title" required
                class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-100 outline-none transition"
                placeholder="e.g. Royal Bodh Gaya Tour" />
            </div>

            <div class="md:col-span-2">
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Image URL</label>
              <input type="url" x-model="formData.image" required
                class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-100 outline-none transition"
                placeholder="https://..." />
              <p class="text-[10px] text-gray-400 mt-1">
                Use an Unsplash or Google Image URL.
              </p>
            </div>

            <div class="md:col-span-2">
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Description</label>
              <textarea x-model="formData.description" rows="3" required
                class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-100 outline-none transition"></textarea>
            </div>
          </div>

          <!-- Package Specific Fields -->
          <template x-if="activeTab === 'packages'">
            <div class="space-y-4 pt-4 border-t border-gray-100">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Price</label>
                  <input type="text" x-model="formData.price"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                    placeholder="e.g. ₹ 12,999" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Duration</label>
                  <input type="text" x-model="formData.duration"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none" placeholder="e.g. 3 Days" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                  <select x-model="formData.category"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none bg-white">
                    <option value="Spiritual">Spiritual</option>
                    <option value="Heritage">Heritage</option>
                    <option value="Nature">Nature</option>
                    <option value="Wildlife">Wildlife</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Route</label>
                  <input type="text" x-model="formData.route"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                    placeholder="e.g. Patna - Gaya" />
                </div>
              </div>

              <!-- Simple Itinerary Builder -->
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 flex justify-between">
                  Itinerary
                  <button type="button" @click="addDay" class="text-orange-600 text-[10px] hover:underline">
                    + Add Day
                  </button>
                </label>
                <div class="space-y-3">
                  <template x-for="(day, index) in formData.itinerary" :key="index">
                    <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 relative group">
                      <button type="button" @click="removeDay(index)"
                        class="absolute top-2 right-2 text-gray-300 hover:text-red-500">
                        <i class="fas fa-times"></i>
                      </button>
                      <input type="text" x-model="day.day"
                        class="text-xs font-bold text-gray-500 bg-transparent border-none p-0 mb-1 w-full"
                        placeholder="Day 1" />
                      <input type="text" x-model="day.title"
                        class="w-full bg-white border border-gray-200 rounded px-2 py-1 text-sm font-bold mb-2"
                        placeholder="Title (e.g. Arrival)" />
                      <textarea x-model="day.desc"
                        class="w-full bg-white border border-gray-200 rounded px-2 py-1 text-xs" rows="2"
                        placeholder="Description"></textarea>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- Destination Fields -->
          <template x-if="activeTab === 'destinations'">
            <div class="space-y-6 pt-4 border-t border-gray-100">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Location</label>
                  <input type="text" x-model="formData.location"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                    placeholder="e.g. Gaya District" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Base Price (₹)</label>
                  <input type="number" x-model="formData.price"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none" placeholder="e.g. 1500" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Rating (1-5)</label>
                  <input type="number" step="0.1" max="5" min="1" x-model="formData.rating"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none" placeholder="e.g. 4.8" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                  <select x-model="formData.category"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none bg-white">
                    <option value="Spiritual">Spiritual</option>
                    <option value="Historical">Historical</option>
                    <option value="Nature">Nature</option>
                    <option value="Wildlife">Wildlife</option>
                  </select>
                </div>
              </div>

              <div class="border-t border-gray-100 pt-6">
                <div class="flex justify-between items-center mb-4">
                  <h4 class="text-sm font-bold text-gray-700 uppercase tracking-wider">
                    Article Sections (Wikipedia Style)
                  </h4>
                  <button type="button" @click="addSection"
                    class="text-orange-600 text-xs font-bold hover:text-orange-700 flex items-center gap-1">
                    <i class="fas fa-plus-circle"></i> Add Section
                  </button>
                </div>

                <div class="space-y-6">
                  <template x-for="(section, index) in (formData.sections || [])" :key="index">
                    <div
                      class="bg-gray-50 p-5 rounded-xl border border-gray-200 relative group transition-all hover:shadow-md">
                      <button type="button" @click="removeSection(index)"
                        class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition-colors">
                        <i class="fas fa-trash-alt"></i>
                      </button>

                      <div class="space-y-4">
                        <div>
                          <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Section
                            Heading</label>
                          <input type="text" x-model="section.heading"
                            class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm font-bold focus:border-orange-500 outline-none"
                            placeholder="e.g. History" />
                        </div>

                        <div class="space-y-2">
                          <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Section Image
                            (Optional)</label>
                          <div class="flex p-1 bg-white border border-gray-100 rounded-lg w-fit">
                            <button type="button" @click="section.imgSource = 'url'"
                              :class="section.imgSource !== 'upload' ? 'bg-gray-100 text-black' : 'text-gray-400'"
                              class="px-3 py-1 rounded-md text-[9px] font-bold uppercase transition-all">
                              Link
                            </button>
                            <button type="button" @click="section.imgSource = 'upload'"
                              :class="section.imgSource === 'upload' ? 'bg-gray-100 text-black' : 'text-gray-400'"
                              class="px-3 py-1 rounded-md text-[9px] font-bold uppercase transition-all">
                              Upload
                            </button>
                          </div>

                          <div x-show="section.imgSource !== 'upload'">
                            <input type="url" x-model="section.image"
                              class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-xs"
                              placeholder="Image URL..." />
                          </div>

                          <div x-show="section.imgSource === 'upload'"
                            class="relative border-2 border-dashed border-gray-200 rounded-xl p-3 bg-white text-center hover:border-orange-400 transition">
                            <input type="file" @change="handleSectionImageUpload($event, index)" accept="image/*"
                              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            <p class="text-[10px] text-gray-400"
                              x-text="section.uploadStatus || 'Click to upload section image'"></p>
                          </div>

                          <template x-if="section.image">
                            <div class="relative w-24 h-16 rounded-lg overflow-hidden border border-gray-200 mt-2">
                              <img :src="section.image" class="w-full h-full object-cover" />
                              <button type="button" @click="section.image = ''"
                                class="absolute top-1 right-1 bg-black/50 text-white w-4 h-4 rounded-full text-[8px]">
                                <i class="fas fa-times"></i>
                              </button>
                            </div>
                          </template>
                        </div>

                        <div>
                          <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Content
                            (Prose)</label>
                          <textarea x-model="section.content"
                            class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-xs leading-relaxed focus:border-orange-500 outline-none"
                            rows="4" placeholder="Enter detailed description..."></textarea>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <div class="grid grid-cols-1 gap-4 pt-4">
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Highlights (Comma
                    separated)</label>
                  <input type="text" x-model="formData.highlights"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                    placeholder="e.g. Guided Tours, Photography, Local Food" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tags (Comma separated)</label>
                  <input type="text" x-model="formData.tags"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                    placeholder="e.g. Temple, History, Peace" />
                </div>
              </div>
            </div>
          </template>
          <!-- Homestay Fields -->
          <template x-if="activeTab === 'homestays'">
            <div class="space-y-6 pt-4 border-t border-gray-100">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Location</label>
                  <input type="text" x-model="formData.location"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                    placeholder="e.g. Bodh Gaya, Bihar" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Price/Night (₹)</label>
                  <input type="number" x-model="formData.price"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none" placeholder="e.g. 2000" />
                </div>

                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Host Name</label>
                  <input type="text" x-model="formData.hostName"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                    placeholder="e.g. Ramesh Babu" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Badge</label>
                  <select x-model="formData.badge"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none bg-white">
                    <option value="Verified">Verified</option>
                    <option value="Superhost">Superhost</option>
                    <option value="Cultural Choice">Cultural Choice</option>
                    <option value="Popular">Popular</option>
                  </select>
                </div>

                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Rating (1-5)</label>
                  <input type="number" step="0.1" max="5" min="1" x-model="formData.rating"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Total Reviews</label>
                  <input type="number" x-model="formData.reviews"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none" placeholder="e.g. 124" />
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Amenities (Comma separated)</label>
                <input type="text" x-model="formData.amenities"
                  class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                  placeholder="wifi, kitchen, ac, parking, garden, river_view" />
                <p class="text-[10px] text-gray-400 mt-1">
                  Use: wifi, kitchen, ac, parking, garden, river_view
                </p>
              </div>

              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Full Description (About this
                  home)</label>
                <textarea x-model="formData.description" rows="4"
                  class="w-full px-4 py-3 rounded-lg border border-gray-200 outline-none"
                  placeholder="Describe the authentic experience, food, and surroundings..."></textarea>
              </div>
            </div>
          </template>
          <div class="pt-4 flex gap-3">
            <button type="button" @click="closeModal"
              class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">
              Cancel
            </button>
            <button type="submit"
              class="flex-1 py-3 bg-black text-white font-bold rounded-xl hover:bg-orange-600 transition shadow-lg flex justify-center items-center gap-2">
              <span x-show="saving"><i class="fas fa-circle-notch fa-spin"></i> Saving...</span>
              <span x-show="!saving" x-text="editMode ? 'Update' : 'Create'"></span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- FIXED: Import from shared firebase-config.js instead of re-initializing Firebase
         (duplicate initializeApp() with hardcoded config caused a second Firebase app instance) -->
  <script type="module">
    // FIXED: Use centralized config — no more duplicate Firebase initialization
    import { auth, db, appId } from "../../assets/js/firebase-config.js";
    import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/module.esm.js';

    import {
      onAuthStateChanged,
      signOut,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    import {
      collection,
      getDocs,
      addDoc,
      doc,
      getDoc,
      updateDoc,
      deleteDoc,
      serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    const storage = getStorage();

    // FIXED: Auth + role guard — only admin or super_admin can access CMS
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = '../../index.html';
        return;
      }
      const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid));
      const role = snap.exists() ? snap.data().role : '';
      if (role !== 'super_admin' && role !== 'admin') {
        document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;font-family:sans-serif;background:#111;color:#fff">
            <h1 style="color:#f87171;font-size:2rem;margin-bottom:1rem">Access Denied</h1>
            <p style="color:#9ca3af">You do not have CMS access.</p>
            <a href="../../index.html" style="margin-top:1.5rem;padding:.75rem 1.5rem;background:#ea580c;color:#fff;border-radius:.75rem;font-weight:700;text-decoration:none">Return to Login</a>
          </div>`;
        return;
      }
      // Store admin email for UI
      window.cmsAdminEmail = user.email;
      window.dispatchEvent(new CustomEvent('cms-auth-ready'));
    });

    // Expose to window for Alpine (non-module script below)
    window.cmsDb = db;
    window.cmsAuth = auth;
    window.cmsSignOut = signOut;
    window.appId = appId;
    window.collection = collection;
    window.getDocs = getDocs;
    window.addDoc = addDoc;
    window.doc = doc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.serverTimestamp = serverTimestamp;
    window.cmsStorage = storage;
    window.storageRef = ref;
    window.uploadBytes = uploadBytes;
    window.getDownloadURL = getDownloadURL;

    // FIXED: Start Alpine as ESM module (not defer CDN tag)
    window.Alpine = Alpine;
    Alpine.start();
  </script>
  <script>
    document.addEventListener("alpine:init", () => {
      Alpine.data("cmsApp", () => ({
        sidebarOpen: false,
        activeTab: "dashboard",
        loading: false,
        saving: false,
        items: [],
        stats: { packages: 0, destinations: 0, homestays: 0 },
        adminEmail: '',
        adminRole: '',

        // Modal & Form State
        isModalOpen: false,
        editMode: false,
        editingId: null,
        formData: {},

        navItems: [
          { id: "dashboard", label: "Dashboard", icon: "fas fa-chart-pie" },
          { id: "packages", label: "Packages", icon: "fas fa-box" },
          {
            id: "destinations",
            label: "Destinations",
            icon: "fas fa-map-marker-alt",
          },
          { id: "homestays", label: "Homestays", icon: "fas fa-home" },
        ],

        init() {
          // FIXED: Wait for auth guard to confirm access before loading data
          const start = () => {
            if (window.cmsDb && window.collection && window.getDocs) {
              this.adminEmail = window.cmsAdminEmail || '';
              this.fetchStats();
              this.$watch("activeTab", (val) => {
                if (val !== "dashboard") this.fetchData(val);
                else this.fetchStats();
              });
            } else {
              setTimeout(start, 50);
            }
          };
          // Listen for auth-ready event OR check if already ready
          if (window.cmsAdminEmail) { start(); }
          else { window.addEventListener('cms-auth-ready', () => { this.adminEmail = window.cmsAdminEmail || ''; start(); }); }
        },
        //helper functions for destination sections
        addSection() {
          if (!this.formData.sections) this.formData.sections = [];
          this.formData.sections.push({ heading: "", content: "" });
        },
        removeSection(index) {
          this.formData.sections.splice(index, 1);
        },
        // Function to handle image uploads for specific article sections
        async handleSectionImageUpload(event, index) {
          const file = event.target.files[0];
          if (!file) return;

          this.formData.sections[index].uploadStatus = "Uploading...";

          try {
            const filePath = `biharyaatra/${window.appId}/sections/${Date.now()}_${file.name}`;
            // Use window.storageRef as defined in the module script
            const fileRef = window.storageRef(window.cmsStorage, filePath);
            const snapshot = await window.uploadBytes(fileRef, file);
            const downloadURL = await window.getDownloadURL(snapshot.ref);

            this.formData.sections[index].image = downloadURL;
            this.formData.sections[index].uploadStatus = "Upload complete!";
          } catch (error) {
            console.error("Section upload failed:", error);
            this.formData.sections[index].uploadStatus = "Failed. Try again.";
          }
        },

        // Update addSection to initialize new fields
        addSection() {
          if (!this.formData.sections) this.formData.sections = [];
          this.formData.sections.push({
            heading: "",
            content: "",
            image: "",
            imgSource: "url",
            uploadStatus: "",
          });
        },

        async fetchStats() {
          // Simple count fetch (optimization: store counts in a stats doc in real app)
          // Here we just fetch all docs to count (okay for small datasets)
          const modules = ["packages", "destinations", "homestays"];
          for (const mod of modules) {
            const snap = await window.getDocs(
              window.collection(
                window.cmsDb,
                "artifacts",
                window.appId,
                "public",
                "data",
                mod,
              ),
            );
            this.stats[mod] = snap.size;
          }
        },

        async fetchData(collectionName) {
          this.loading = true;
          this.items = [];
          try {
            const path = `artifacts/${window.appId}/public/data/${collectionName}`;
            const querySnapshot = await window.getDocs(
              window.collection(
                window.cmsDb,
                "artifacts",
                window.appId,
                "public",
                "data",
                collectionName,
              ),
            );
            this.items = querySnapshot.docs.map((d) => ({
              id: d.id,
              ...d.data(),
            }));
          } catch (e) {
            console.error("Fetch error:", e);
            alert("Error fetching data. Check console.");
          } finally {
            this.loading = false;
          }
        },

        openModal(item = null) {
          this.editMode = !!item;
          this.editingId = item ? item.id : null;

          if (item) {
            // Clone item to avoid direct reactivity
            this.formData = JSON.parse(JSON.stringify(item));

            // Convert arrays back to comma-separated strings for easy editing in the form
            if (this.formData.tags)
              this.formData.tags = this.formData.tags.join(", ");
            if (this.formData.amenities)
              this.formData.amenities = this.formData.amenities.join(", ");
            if (this.formData.highlights)
              this.formData.highlights = this.formData.highlights.join(", ");
          } else {
            // Fresh Form with all necessary fields for Destinations, Packages, and Homestays
            this.formData = {
              title: "",
              name: "",
              description: "",
              image: "",
              location: "",
              price: 0,
              rating: 5,
              category: "Spiritual",
              // Package specific
              duration: "",
              route: "",
              itinerary: [{ day: "Day 1", title: "", desc: "" }],
              // Arrays (stored as strings in the form)
              amenities: "",
              tags: "",
              highlights: "",
            };
          }
          this.isModalOpen = true;
        },

        closeModal() {
          this.isModalOpen = false;
        },

        addDay() {
          if (!this.formData.itinerary) this.formData.itinerary = [];
          const count = this.formData.itinerary.length + 1;
          this.formData.itinerary.push({
            day: `Day ${count}`,
            title: "",
            desc: "",
          });
        },

        removeDay(index) {
          this.formData.itinerary.splice(index, 1);
        },

        async saveItem() {
          this.saving = true;
          const colName = this.activeTab;
          // Define the path to the specific collection in Firestore
          const pathRoot = [
            "artifacts",
            window.appId,
            "public",
            "data",
            colName,
          ];

          try {
            // 1. Handle Array Conversions for tags, amenities, and highlights
            // This converts comma-separated strings from the UI into arrays for the DB
            const arrayFields = ["tags", "amenities", "highlights"];
            arrayFields.forEach((field) => {
              if (
                this.formData[field] &&
                typeof this.formData[field] === "string"
              ) {
                this.formData[field] = this.formData[field]
                  .split(",")
                  .map((s) => s.trim());
              }
            });

            // 2. Data Normalization
            // Ensure price and rating are stored as Numbers, not Strings, for calculations
            if (this.formData.price) {
              this.formData.price = Number(this.formData.price);
            }
            if (this.formData.rating) {
              this.formData.rating = Number(this.formData.rating);
            }
            // Inside saveItem() in cms.html
            if (
              (colName === "destinations" || colName === "homestays") &&
              this.formData.title
            ) {
              this.formData.name = this.formData.title;
            }

            // 3. Handle Field Mismatches
            // Destinations use 'name' in the UI/DB but the common form field is 'title'
            if (colName === "destinations" && this.formData.title) {
              this.formData.name = this.formData.title;
            }

            // 4. Persistence Logic
            if (this.editMode) {
              // Update existing document
              const docRef = window.doc(
                window.cmsDb,
                ...pathRoot,
                this.editingId,
              );
              await window.updateDoc(docRef, {
                ...this.formData,
                updatedAt: window.serverTimestamp(),
              });

              // Update the local UI list immediately
              const idx = this.items.findIndex(
                (i) => i.id === this.editingId,
              );
              if (idx !== -1) {
                this.items[idx] = { id: this.editingId, ...this.formData };
              }
            } else {
              // Create new document
              const colRef = window.collection(window.cmsDb, ...pathRoot);
              const docRef = await window.addDoc(colRef, {
                ...this.formData,
                createdAt: window.serverTimestamp(),
              });

              // Add to the local UI list and update dashboard stats
              this.items.push({ id: docRef.id, ...this.formData });
              if (this.stats[colName] !== undefined) {
                this.stats[colName]++;
              }
            }

            // 5. Close UI and cleanup
            this.closeModal();
            console.log(`${colName} saved successfully.`);
          } catch (e) {
            console.error("Save failed:", e);
            alert("Failed to save. Please check the console for details.");
          } finally {
            this.saving = false;
          }
        },

        async deleteItem(id) {
          if (!confirm("Are you sure you want to delete this item?")) return;

          try {
            const colName = this.activeTab;
            await window.deleteDoc(
              window.doc(
                window.cmsDb,
                "artifacts",
                window.appId,
                "public",
                "data",
                colName,
                id,
              ),
            );

            // Update UI
            this.items = this.items.filter((i) => i.id !== id);
            this.stats[colName]--;
          } catch (e) {
            console.error("Delete failed:", e);
            alert("Failed to delete.");
          }
        },

        // FIXED: Wrong logout path was "../index.html" — correct path is "../../index.html"
        async logout() {
          if (window.cmsSignOut && window.cmsAuth) {
            await window.cmsSignOut(window.cmsAuth);
          }
          window.location.href = "../../index.html";
        },
      }));
    });
  </script>
</body>

</html>
