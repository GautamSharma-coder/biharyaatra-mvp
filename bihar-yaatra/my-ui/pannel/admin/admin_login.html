<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Bihar Yaatra</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #FF9933; 
      --color-secondary: #138808;
    }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #f3f4f6;
    }
    .font-display { font-family: 'Syne', sans-serif; }
    [x-cloak] { display: none !important; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden" x-data="adminLogin()">

  <div class="absolute inset-0 z-0 opacity-10">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Map_of_Bihar.jpg" class="w-full h-full object-cover grayscale">
  </div>

  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-10 relative z-10">
      
      <div class="text-center mb-10">
          <div class="inline-flex items-center gap-2 mb-2">
              <i class="fas fa-shield-alt text-orange-600 text-3xl"></i>
              <span class="font-display font-bold text-2xl tracking-tighter text-gray-900">Bihar<span class="text-orange-500">Yaatra</span></span>
          </div>
          <p class="text-gray-500 font-bold uppercase tracking-widest text-xs">Admin Control Panel</p>
      </div>

      <div x-show="error" x-transition class="mb-6 p-4 bg-red-50 border border-red-100 rounded-xl flex items-start gap-3 text-red-600 text-sm font-bold" x-cloak>
          <i class="fas fa-exclamation-circle mt-0.5"></i>
          <span x-text="error"></span>
      </div>

      <form @submit.prevent="login">
          <div class="space-y-6">
              <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">Admin ID</label>
                  <div class="flex items-center bg-gray-50 rounded-xl p-3 border border-gray-200 focus-within:border-orange-500 transition group">
                      <i class="fas fa-user-shield text-gray-400 mr-3 group-focus-within:text-orange-500"></i>
                      <input type="email" x-model="email" placeholder="admin@biharyaatra.com" class="w-full bg-transparent border-none outline-none font-bold text-gray-900 placeholder-gray-300">
                  </div>
              </div>

              <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">Password</label>
                  <div class="flex items-center bg-gray-50 rounded-xl p-3 border border-gray-200 focus-within:border-orange-500 transition group">
                      <i class="fas fa-lock text-gray-400 mr-3 group-focus-within:text-orange-500"></i>
                      <input type="password" x-model="password" placeholder="••••••••" class="w-full bg-transparent border-none outline-none font-bold text-gray-900 placeholder-gray-300">
                  </div>
              </div>

              <div class="flex items-center justify-between text-sm">
                  <label class="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" class="accent-orange-600 h-4 w-4">
                      <span class="text-gray-600 font-medium">Remember me</span>
                  </label>
                  <a href="#" class="text-orange-600 font-bold hover:underline">Forgot Password?</a>
              </div>

              <button type="submit" 
                      class="w-full py-4 bg-black text-white font-bold rounded-xl shadow-lg hover:bg-orange-600 transition-all flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed group"
                      :disabled="loading">
                  <span x-show="!loading">Secure Login</span>
                  <i x-show="!loading" class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                  <i x-show="loading" class="fas fa-circle-notch fa-spin"></i>
              </button>
          </div>
      </form>

      <div class="mt-8 text-center">
          <p class="text-xs text-gray-400 font-medium">Restricted Access. IP Logged.</p>
          <p class="text-[10px] text-gray-300 mt-1">Demo: admin@biharyaatra.com / admin123</p>
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAO1bKiSsTHCsGlgFXm_-D2gbFBqXdWQuE",
      authDomain: "biharyaatra-t.firebaseapp.com",
      projectId: "biharyaatra-t",
      storageBucket: "biharyaatra-t.firebasestorage.app",
      messagingSenderId: "101220485604",
      appId: "1:101220485604:web:e96c3230ee36de85ba1ff1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    window.auth = auth;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
  </script>

  <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('adminLogin', () => ({
            email: '',
            password: '',
            loading: false,
            error: null,

            async login() {
                this.loading = true;
                this.error = null;

                // Basic Admin Check (Client-side simulation)
                if (!this.email.includes('admin') && !this.email.includes('biharyaatra')) {
                    // This is just a UI check. Real security requires Custom Claims.
                    this.error = "Access Denied: Unauthorized Email.";
                    this.loading = false;
                    return;
                }

                try {
                    await window.signInWithEmailAndPassword(window.auth, this.email, this.password);
                    window.location.href = 'admin_dashboard.html';
                } catch (err) {
                    console.error("Login failed", err);
                    if(err.code === 'auth/invalid-credential') {
                        this.error = "Invalid Admin ID or Password.";
                    } else {
                        this.error = "Login failed. Please try again.";
                    }
                } finally {
                    this.loading = false;
                }
            }
        }));
    });
  </script>
</body>
</html>
