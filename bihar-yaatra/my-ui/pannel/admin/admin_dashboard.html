<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dashboard - Bihar Yaatra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- REMOVED: CDN defer Alpine tag — now loaded as ESM module in script below to avoid conflict -->

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f8fafc;
        }

        .font-display {
            font-family: 'Syne', sans-serif;
        }

        [x-cloak] {
            display: none !important;
        }

        .nav-link {
            transition: all 0.3s;
        }

        .nav-link.active {
            background-color: #fff7ed;
            color: #ea580c;
            border-right: 4px solid #ea580c;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
            font-weight: 700;
        }
    </style>
</head>

<!-- FIXED: x-data and x-init now work because Alpine is started as ESM module below -->

<body class="flex h-screen overflow-hidden" x-data="adminPanel()" x-cloak>

    <!-- ── ACCESS DENIED SCREEN ───────────────────────── -->
    <div x-show="accessDenied"
        class="fixed inset-0 bg-gray-900 flex flex-col items-center justify-center z-50 text-center p-8">
        <i class="fas fa-ban text-red-500 text-5xl mb-4"></i>
        <h1 class="text-3xl font-bold text-red-400 mb-2">Access Denied</h1>
        <p class="text-gray-400 mb-6">You do not have admin clearance to view this panel.</p>
        <a href="../../index.html"
            class="px-6 py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-orange-600 transition">
            Return to Login
        </a>
    </div>

    <!-- ── LOADING SCREEN ────────────────────────────── -->
    <div x-show="authLoading" class="fixed inset-0 bg-white flex items-center justify-center z-40">
        <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-gray-200 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="text-gray-400 text-sm">Verifying session...</p>
        </div>
    </div>

    <!-- ── MAIN LAYOUT ───────────────────────────────── -->
    <template x-if="!authLoading && !accessDenied">
        <div class="flex w-full h-full">

            <!-- Sidebar -->
            <aside class="w-64 bg-white border-r border-gray-100 flex flex-col z-20 shadow-lg">
                <div class="h-16 flex items-center justify-center border-b border-gray-100">
                    <a href="#" class="font-display font-bold text-xl tracking-tighter flex items-center gap-2">
                        <i class="fas fa-shield-alt text-orange-500"></i>
                        Admin<span class="text-orange-600">Panel</span>
                    </a>
                </div>

                <nav class="flex-1 overflow-y-auto py-6 space-y-1 custom-scroll">
                    <p class="px-6 text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Overview</p>
                    <a href="#" @click.prevent="tab = 'dashboard'"
                        :class="tab === 'dashboard' ? 'active' : 'text-gray-600 hover:bg-gray-50'"
                        class="nav-link flex items-center gap-3 px-6 py-3 font-medium">
                        <i class="fas fa-th-large w-5"></i> Dashboard
                    </a>
                    <a href="#" @click.prevent="tab = 'bookings'"
                        :class="tab === 'bookings' ? 'active' : 'text-gray-600 hover:bg-gray-50'"
                        class="nav-link flex items-center gap-3 px-6 py-3 font-medium">
                        <i class="fas fa-calendar-check w-5"></i> Bookings
                    </a>

                    <p class="px-6 text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 mt-6">Management</p>
                    <a href="#" @click.prevent="tab = 'tourists'"
                        :class="tab === 'tourists' ? 'active' : 'text-gray-600 hover:bg-gray-50'"
                        class="nav-link flex items-center gap-3 px-6 py-3 font-medium">
                        <i class="fas fa-users w-5"></i> System Users
                    </a>
                    <a href="#" @click.prevent="tab = 'homestays'"
                        :class="tab === 'homestays' ? 'active' : 'text-gray-600 hover:bg-gray-50'"
                        class="nav-link flex items-center gap-3 px-6 py-3 font-medium">
                        <i class="fas fa-home w-5"></i> Homestays
                    </a>
                    <a href="#" @click.prevent="tab = 'transport'"
                        :class="tab === 'transport' ? 'active' : 'text-gray-600 hover:bg-gray-50'"
                        class="nav-link flex items-center gap-3 px-6 py-3 font-medium">
                        <i class="fas fa-bus w-5"></i> Transport
                    </a>

                    <p class="px-6 text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 mt-6">Root Admin</p>
                    <a href="../../admin_create.html"
                        class="nav-link text-gray-600 hover:bg-gray-50 flex items-center gap-3 px-6 py-3 font-medium">
                        <i class="fas fa-user-plus w-5"></i> Create Users
                    </a>
                    <a href="cms.html"
                        class="nav-link text-gray-600 hover:bg-gray-50 flex items-center gap-3 px-6 py-3 font-medium">
                        <i class="fas fa-edit w-5"></i> CMS
                    </a>
                </nav>

                <div class="p-4 border-t border-gray-100">
                    <div class="flex items-center gap-3 px-2 mb-3">
                        <div class="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white font-bold text-xs"
                            x-text="adminEmail.charAt(0).toUpperCase()"></div>
                        <div class="overflow-hidden">
                            <p class="text-xs font-bold text-gray-800 truncate" x-text="adminEmail"></p>
                            <p class="text-[10px] text-orange-500 font-bold uppercase" x-text="adminRole"></p>
                        </div>
                    </div>
                    <button @click="logout()"
                        class="w-full flex items-center gap-2 text-red-500 font-bold px-4 hover:bg-red-50 py-2 rounded-lg transition">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 flex flex-col h-full bg-gray-50 overflow-hidden">
                <header
                    class="h-16 bg-white border-b border-gray-100 flex justify-between items-center px-8 shadow-sm z-10">
                    <h2 class="text-xl font-bold font-display capitalize" x-text="tab"></h2>
                    <div class="flex items-center gap-4">
                        <span class="text-xs text-gray-400">Live sync active</span>
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    </div>
                </header>

                <div class="flex-1 overflow-y-auto p-8 custom-scroll">

                    <!-- DASHBOARD TAB -->
                    <div x-show="tab === 'dashboard'" x-transition.opacity>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <p class="text-xs text-gray-400 font-bold uppercase">System Users</p>
                                <h3 class="text-3xl font-display font-bold" x-text="stats.users">0</h3>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <p class="text-xs text-gray-400 font-bold uppercase">Total Bookings</p>
                                <h3 class="text-3xl font-display font-bold" x-text="stats.bookings">0</h3>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <p class="text-xs text-gray-400 font-bold uppercase">Homestays</p>
                                <h3 class="text-3xl font-display font-bold" x-text="stats.homestays">0</h3>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <p class="text-xs text-gray-400 font-bold uppercase">Revenue (Est.)</p>
                                <h3 class="text-3xl font-display font-bold text-green-600">₹<span
                                        x-text="stats.revenue">0</span></h3>
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 class="font-bold text-lg mb-6">Booking Volume (Monthly)</h3>
                            <div class="h-48 flex items-end justify-between gap-2 px-2">
                                <template x-for="(bar, i) in revenueChart" :key="i">
                                    <div class="w-full flex flex-col items-center gap-1">
                                        <div class="w-full bg-orange-100 hover:bg-orange-500 transition-colors rounded-t-lg"
                                            :style="`height: ${bar.h}px`"></div>
                                        <span class="text-[10px] text-gray-400" x-text="bar.label"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- SYSTEM USERS TAB -->
                    <!-- FIXED: was reading root "users" collection, now reads correct path -->
                    <div x-show="tab === 'tourists'" x-cloak x-transition.opacity>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                                <h3 class="font-bold">System Users</h3>
                                <span class="text-xs text-gray-400" x-text="users.length + ' total'"></span>
                            </div>
                            <table class="w-full text-left">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-4">User</th>
                                        <th class="px-6 py-4">Role</th>
                                        <th class="px-6 py-4">Status</th>
                                        <th class="px-6 py-4 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                    <template x-for="user in users" :key="user.id">
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-6 py-4">
                                                <div class="flex items-center gap-3">
                                                    <div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center font-bold text-xs text-orange-600"
                                                        x-text="(user.name || 'U').charAt(0).toUpperCase()"></div>
                                                    <div>
                                                        <p class="font-bold text-sm" x-text="user.name || 'Unnamed'">
                                                        </p>
                                                        <p class="text-xs text-gray-500" x-text="user.email"></p>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="px-6 py-4">
                                                <span
                                                    class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full capitalize"
                                                    x-text="(user.role || 'unknown').replace('_',' ')"></span>
                                            </td>
                                            <td class="px-6 py-4">
                                                <span
                                                    class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full"
                                                    x-text="user.status || 'active'"></span>
                                            </td>
                                            <td class="px-6 py-4 text-right">
                                                <button @click="deleteUser(user.id)"
                                                    class="text-gray-400 hover:text-red-500 transition"
                                                    title="Remove from database">
                                                    <i class="fas fa-trash text-xs"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    </template>
                                    <tr x-show="users.length === 0">
                                        <td colspan="4" class="px-6 py-8 text-center text-gray-400 text-sm">No users
                                            found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- BOOKINGS TAB -->
                    <!-- FIXED: was reading root "bookings" collection, now reads correct path -->
                    <div x-show="tab === 'bookings'" x-cloak x-transition.opacity>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                                <h3 class="font-bold">All Bookings</h3>
                                <span class="text-xs text-gray-400" x-text="bookings.length + ' total'"></span>
                            </div>
                            <table class="w-full text-left">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-4">Service</th>
                                        <th class="px-6 py-4">Tourist</th>
                                        <th class="px-6 py-4">Amount</th>
                                        <th class="px-6 py-4 text-right">Status</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                    <template x-for="booking in bookings" :key="booking.id">
                                        <tr>
                                            <td class="px-6 py-4 text-sm font-bold"
                                                x-text="booking.serviceName || booking.propertyName || 'Package Trip'">
                                            </td>
                                            <td class="px-6 py-4 text-sm text-gray-500 font-mono text-xs"
                                                x-text="booking.userId ? booking.userId.substring(0,10)+'...' : 'N/A'">
                                            </td>
                                            <td class="px-6 py-4 text-sm font-bold text-green-600"
                                                x-text="booking.totalAmount ? '₹' + booking.totalAmount : '—'"></td>
                                            <td class="px-6 py-4 text-right">
                                                <span class="px-2 py-1 text-xs font-bold rounded-full capitalize"
                                                    :class="booking.status === 'confirmed' ? 'bg-green-100 text-green-700' : booking.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-700'"
                                                    x-text="booking.status || 'unknown'"></span>
                                            </td>
                                        </tr>
                                    </template>
                                    <tr x-show="bookings.length === 0">
                                        <td colspan="4" class="px-6 py-8 text-center text-gray-400 text-sm">No bookings
                                            found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- HOMESTAYS TAB -->
                    <div x-show="tab === 'homestays'" x-cloak x-transition.opacity>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="px-6 py-4 border-b border-gray-100">
                                <h3 class="font-bold">Registered Homestays</h3>
                            </div>
                            <div class="divide-y divide-gray-50">
                                <template x-for="hs in homestays" :key="hs.id">
                                    <div class="px-6 py-4 flex items-center justify-between">
                                        <div>
                                            <p class="font-bold text-sm" x-text="hs.propertyName || 'Unnamed Property'">
                                            </p>
                                            <p class="text-xs text-gray-500" x-text="hs.location || 'Location unknown'">
                                            </p>
                                        </div>
                                        <span
                                            class="px-2 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded-full capitalize"
                                            x-text="hs.status || 'active'"></span>
                                    </div>
                                </template>
                                <div x-show="homestays.length === 0"
                                    class="px-6 py-8 text-center text-gray-400 text-sm">No homestays found.</div>
                            </div>
                        </div>
                    </div>

                    <!-- TRANSPORT TAB -->
                    <div x-show="tab === 'transport'" x-cloak x-transition.opacity>
                        <div
                            class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center text-gray-400">
                            <i class="fas fa-bus text-3xl mb-3"></i>
                            <p class="text-sm">Transport data panel — connect to Firestore transport collection.</p>
                        </div>
                    </div>

                </div>
            </main>

        </div>
    </template>

    <!-- ═══════════════════════════════════════
       FIREBASE + ALPINE — ESM MODULE (FIXED)
  ═══════════════════════════════════════ -->
    <script type="module">
        // FIXED: Import appId — it was missing before
        import { auth, db, appId } from "../../assets/js/firebase-config.js";
        import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/module.esm.js';

        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { collection, onSnapshot, doc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.adminPanel = function () {
            return {
                tab: 'dashboard',
                authLoading: true,
                accessDenied: false,
                adminEmail: '',
                adminRole: '',
                stats: { users: 0, bookings: 0, homestays: 0, revenue: 0 },
                users: [],
                bookings: [],
                homestays: [],
                revenueChart: [
                    { h: 40, label: 'Mar' }, { h: 65, label: 'Apr' }, { h: 45, label: 'May' },
                    { h: 80, label: 'Jun' }, { h: 55, label: 'Jul' }, { h: 90, label: 'Aug' },
                    { h: 70, label: 'Sep' }, { h: 85, label: 'Oct' }, { h: 60, label: 'Nov' },
                    { h: 75, label: 'Dec' }, { h: 50, label: 'Jan' }, { h: 95, label: 'Feb' }
                ],

                async init() {
                    onAuthStateChanged(auth, async (user) => {
                        if (!user) {
                            window.location.href = '../../index.html';
                            return;
                        }

                        // FIXED: Role guard — check Firestore for admin/super_admin role
                        const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid));
                        const data = snap.exists() ? snap.data() : {};
                        const role = data.role || '';

                        if (role !== 'super_admin' && role !== 'admin') {
                            this.accessDenied = true;
                            this.authLoading = false;
                            return;
                        }

                        this.adminEmail = user.email;
                        this.adminRole = role.replace('_', ' ');
                        this.authLoading = false;
                        this.loadLiveData();
                    });
                },

                loadLiveData() {
                    // FIXED: was "users" → correct path: artifacts/{appId}/users
                    onSnapshot(collection(db, 'artifacts', appId, 'users'), (snap) => {
                        this.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.stats.users = this.users.length;
                    });

                    // FIXED: was "bookings" → correct path: artifacts/{appId}/public/data/all_bookings
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'all_bookings'), (snap) => {
                        this.bookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.stats.bookings = this.bookings.length;
                        // Calculate estimated revenue from confirmed bookings
                        this.stats.revenue = this.bookings
                            .filter(b => b.status === 'confirmed')
                            .reduce((sum, b) => sum + (Number(b.totalAmount) || 0), 0)
                            .toLocaleString('en-IN');
                    });

                    // Homestays: artifacts/{appId}/public/data/homestays
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'homestays'), (snap) => {
                        this.homestays = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.stats.homestays = this.homestays.length;
                    });
                },

                async deleteUser(id) {
                    if (!confirm('Remove this user record from the database?')) return;
                    try {
                        // FIXED: was deleting from root "users" → correct path
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', id));
                    } catch (e) {
                        alert('Error removing user: ' + e.message);
                    }
                },

                async logout() {
                    await signOut(auth);
                    window.location.href = '../../index.html';
                }
            };
        };

        window.Alpine = Alpine;
        Alpine.start();
    </script>
</body>

</html>
